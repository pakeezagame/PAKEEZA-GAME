<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PAKEEZA GAME</title>

<link rel="stylesheet" href="style.css">

<style>
.login-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d1027,#1d2fff,#111);
}

.login-box{
    width:380px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    border:1px solid rgba(255,255,255,.15);
    text-align:center;
    color:#fff;
}

.login-box h1{
    color:#ffd700;
    margin-bottom:10px;
}

.login-box p{
    color:#ccc;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    outline:none;
}
